apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-deployment"
  {{- template "hello-app.labels" }}
spec:
  replicas: "{{ .Values.replicaCount }}"
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
      name: "{{ .Release.Name }"
    spec:
      containers:
        - name: "{{ .Release.Name }}"
          image: "{{ .Values.dockerImage }}:{{ .Values.dockerTag }}"
          ports:
            - containerPort: "{{ .Values.containerPort }}"
