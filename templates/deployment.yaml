apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
    {{- template "hello-app.labels" }}
spec:
  replicas: "{{ .Values.replicaCount }}"
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
        - name: hello-app
          image: "{{ .Values.dockerImage }}:{{ .Values.dockerTag }}"
          ports:
            - containerPort: "{{ .Values.containerPort }}"
